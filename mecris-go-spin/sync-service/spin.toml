#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "mecris-sync-v2"
version = "0.0.1-beta.4"
authors = ["Kingdon B <kingdon@urmanac.com>"]
description = ""

[variables]
db_url = { required = false, default = "" }
auth_bypass = { required = false, default = "false" }
oidc_discovery_url = { required = false, default = "https://metnoom.urmanac.com/.well-known/openid-configuration" }
oidc_jwks_json = { required = false, default = "" }
clozemaster_email = { required = false, default = "" }
clozemaster_password = { required = false, default = "" }
master_encryption_key = { required = false, default = "" }
neon_db_url = { required = false, default = "" }
twilio_account_sid = { required = false, default = "" }
twilio_auth_token_encrypted = { required = false, default = "" }
twilio_from_number = { required = false, default = "" }
openweather_api_key = { required = false, default = "" }
openweather_lat = { required = false, default = "" }
openweather_lon = { required = false, default = "" }
internal_api_key = { required = false, default = "" }
twilio_whatsapp_template_sid = { required = false, default = "" }
cloud_provider = { required = false, default = "unknown_cloud" }

[[trigger.http]]
route = "/internal/review-pump-status"
component = "review-pump"

[[trigger.http]]
route = "/internal/review-pump-status-py"
component = "review-pump-py"

[[trigger.http]]
route = "/internal/budget-governor-py"
component = "budget-governor-py"

[[trigger.http]]
route = "/internal/arabic-skip-count"
component = "arabic-skip-counter"

[[trigger.http]]
route = "/..."
component = "sync-service"

# [[trigger.cron]]
# component = "sync-service"
# cron_expression = "0 0 */2 * * *"
# NOTE: Cron is temporarily disabled to avoid masking issues in the main framework.
# Fermyon Cloud does not currently support cron triggers natively. Use GitHub Actions.

[component.sync-service]
source = "target/wasm32-wasip1/release/sync_service.wasm"
allowed_outbound_hosts = ["postgres://*:*", "https://www.beeminder.com", "https://www.clozemaster.com", "https://api.twilio.com", "https://api.openweathermap.org", "https://metnoom.urmanac.com"]
key_value_stores = ["default"]
[component.sync-service.variables]
db_url = "{{ db_url }}"
auth_bypass = "{{ auth_bypass }}"
oidc_discovery_url = "{{ oidc_discovery_url }}"
oidc_jwks_json = "{{ oidc_jwks_json }}"
clozemaster_email = "{{ clozemaster_email }}"
clozemaster_password = "{{ clozemaster_password }}"
master_encryption_key = "{{ master_encryption_key }}"
twilio_account_sid = "{{ twilio_account_sid }}"
twilio_auth_token_encrypted = "{{ twilio_auth_token_encrypted }}"
twilio_from_number = "{{ twilio_from_number }}"
openweather_api_key = "{{ openweather_api_key }}"
openweather_lat = "{{ openweather_lat }}"
openweather_lon = "{{ openweather_lon }}"
internal_api_key = "{{ internal_api_key }}"
twilio_whatsapp_template_sid = "{{ twilio_whatsapp_template_sid }}"
cloud_provider = "{{ cloud_provider }}"
[component.sync-service.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]

[component.review-pump]
source = "../review-pump/target/wasm32-wasip1/release/review_pump.wasm"
[component.review-pump.build]
command = "cargo build --target wasm32-wasip1 --release --features spin"
workdir = "../review-pump"
watch = ["src/**/*.rs", "Cargo.toml"]

# review-pump-py: Python-native WASM component (componentize-py + spin_sdk, Phase 1.7 / Holy Grail #157).
# HTTP trigger: POST /internal/review-pump-status-py
# Body JSON: {debt, tomorrow_liability, daily_completions, multiplier_x10, unit}
# Returns JSON: PumpStatus object — parity with Rust review-pump at /internal/review-pump-status
[component.review-pump-py]
source = "../../poc/wasm/review-pump-py/review-pump-py.wasm"
[component.review-pump-py.build]
command = "python3 -m pip install --user --break-system-packages -r requirements.txt && spin py2wasm app -o review-pump-py.wasm"
workdir = "../../poc/wasm/review-pump-py"
watch = ["app.py", "wit/*.wit"]

# budget-governor-py: Python-native WASM component (componentize-py + spin_sdk, Phase 1.7.2 / kingdonb/mecris#214).
# HTTP trigger: POST /internal/budget-governor-py
# Body JSON: {"action": "status"|"check"|"record"|"recommend"|"gate", "bucket": <str>, "cost": <float>}
# Returns JSON: action-specific response dict — ports 5%/5% spend envelope logic from services/budget_governor.py.
# Reads budget limits from Spin variables; persists spend log via Spin KV; fetches Helix balance via outbound HTTP.
[component.budget-governor-py]
source = "../../poc/wasm/budget-governor-py/budget-governor-py.wasm"
key_value_stores = ["default"]
[component.budget-governor-py.build]
command = "python3 -m pip install --user --break-system-packages -r requirements.txt && spin py2wasm app -o budget-governor-py.wasm"
workdir = "../../poc/wasm/budget-governor-py"
watch = ["app.py", "wit/*.wit"]

# arabic-skip-counter: Python WASM component (componentize-py + spin_sdk, Phase 1.6).
# HTTP trigger: GET /internal/arabic-skip-count?user_id=<id>&hours=<n>
# Returns JSON: {"skip_count": <u32>}
# Reads neon_db_url from Spin variables.
[component.arabic-skip-counter]
source = "../arabic-skip-counter/arabic-skip-counter.wasm"
allowed_outbound_hosts = ["https://*.neon.tech"]
[component.arabic-skip-counter.variables]
neon_db_url = "{{ neon_db_url }}"
[component.arabic-skip-counter.build]
command = "python3 -m pip install --user --break-system-packages -r requirements.txt && spin py2wasm app -o arabic-skip-counter.wasm"
workdir = "../arabic-skip-counter"
watch = ["app.py", "wit/*.wit"]
