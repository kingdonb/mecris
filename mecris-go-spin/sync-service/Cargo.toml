[package]
name = "sync-service"
authors = ["Kingdon B <kingdon@urmanac.com>"]
description = ""
version = "0.1.0"
rust-version = "1.78"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1"
base64 = "0.22.1"
chrono = { version = "0.4.44", features = ["std"] }
chrono-tz = "0.10.0"
hmac = "0.13.0"
