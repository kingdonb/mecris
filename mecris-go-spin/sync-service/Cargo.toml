serde_json = "1.0.149"
sha1 = "0.11"
sha2 = "0.11.0"
jwt-simple = "0.12.11"
aes-gcm = "0.10.3"
hex = "0.4.3"
getrandom = "0.4.0"
spin-sdk = "5.0.0"
spin-cron-sdk = { git = "https://github.com/fermyon/spin-trigger-cron" }
urlencoding = "2.1.3"
