name: mecris-bot

on:
  schedule:
    # 8 runs/day, every 2 hours, 7:17am–9:17pm US Eastern (EDT=UTC-4)
    # UTC hours: 11, 13, 15, 17, 19, 21, 23, 01
    - cron: '17 1,11,13,15,17,19,21,23 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Override the default autonomous prompt'
        required: false
      model:
        description: 'Model override (leave blank for claude-sonnet-4-6)'
        required: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.MECRIS_BOT_PAT }}
          submodules: false
          fetch-depth: 0

      - name: Set bot git identity
        run: |
          git config user.name "mecris-bot"
          git config user.email "mecris-bot@noreply"

      - name: Install Node + Claude CLI
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22'
      - run: npm install -g @anthropic-ai/claude-code@2.1.85

      - name: Validate Helix API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.MECRIS_BOT_ANTHROPIC_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.MECRIS_BOT_ANTHROPIC_BASE_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $ANTHROPIC_API_KEY" \
            "${ANTHROPIC_BASE_URL}/v1/models")
          echo "Helix key validation status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Helix API key is invalid or expired (HTTP $STATUS). Update MECRIS_BOT_ANTHROPIC_KEY secret."
            exit 1
          fi

      - name: Run mecris-bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.MECRIS_BOT_ANTHROPIC_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.MECRIS_BOT_ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.MECRIS_BOT_PAT }}
          PROMPT: ${{ github.event.inputs.prompt || '' }}
          MODEL: ${{ github.event.inputs.model || 'claude-sonnet-4-6' }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
          GITHUB_CLASSIC_PAT: ${{ secrets.MECRIS_BOT_CLASSIC_PAT }}
        run: |
          DEFAULT_PROMPT="$(cat scripts/bot-prompt.txt)"
          claude --dangerously-skip-permissions \
            --model "${MODEL}" \
            --max-turns 80 \
            -p "${PROMPT:-$DEFAULT_PROMPT}"

      - name: Show commits made this run
        run: git log --oneline -5

      - name: Push any commits the bot made
        env:
          GIT_AUTHOR_NAME: mecris-bot
          GIT_AUTHOR_EMAIL: mecris-bot@noreply
          GIT_COMMITTER_NAME: mecris-bot
          GIT_COMMITTER_EMAIL: mecris-bot@noreply
        run: |
          # Pull before push to handle any race conditions or upstream changes during the run
          git pull --rebase origin main
          git push origin main || echo "Nothing to push"
