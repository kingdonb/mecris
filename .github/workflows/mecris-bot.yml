name: mecris-bot

on:
  schedule:
    # 8 runs/day, every 2 hours, 7am–9pm UTC (adjust to your timezone)
    - cron: '17 7,9,11,13,15,17,19,21 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Override the default autonomous prompt'
        required: false
      model:
        description: 'Claude model (default: claude-haiku-4-5 to save cost)'
        required: false
        default: 'claude-haiku-4-5'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MECRIS_BOT_PAT }}

      - name: Set bot git identity
        run: |
          git config user.name "mecris-bot"
          git config user.email "mecris-bot@noreply"

      - name: Install Node + Claude CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @anthropic-ai/claude-code

      - name: Run mecris-bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.MECRIS_BOT_ANTHROPIC_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.MECRIS_BOT_ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.MECRIS_BOT_PAT }}
          PROMPT: ${{ github.event.inputs.prompt || '' }}
        env:
          MODEL: ${{ github.event.inputs.model || 'claude-haiku-4-5' }}
        run: |
          DEFAULT_PROMPT="$(cat scripts/bot-prompt.txt)"
          claude --dangerously-skip-permissions \
            --model "${MODEL}" \
            --max-turns 10 \
            -p "${PROMPT:-$DEFAULT_PROMPT}"

      - name: Push any commits the bot made
        env:
          GIT_AUTHOR_NAME: mecris-bot
          GIT_AUTHOR_EMAIL: mecris-bot@noreply
          GIT_COMMITTER_NAME: mecris-bot
          GIT_COMMITTER_EMAIL: mecris-bot@noreply
        run: |
          git push origin main || echo "Nothing to push"
