name: e2e-pi-mecris

on:
  push:
    branches:
      - main
    paths:
      - '.pi/extensions/mecris/**'
      - 'tests/e2e_pi_mecris.*'
      - 'py_harness/**'
      - 'mcp_*.py'
      - '.github/workflows/e2e-pi-mecris.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.pi/extensions/mecris/**'
      - 'tests/e2e_pi_mecris.*'
      - 'py_harness/**'
      - 'mcp_*.py'
  workflow_dispatch:
    inputs:
      model:
        description: 'Pi model to test with (default: claude-haiku-4.5)'
        required: false
        default: 'claude-haiku-4.5'
      provider:
        description: 'Pi provider (default: github-copilot)'
        required: false
        default: 'github-copilot'

jobs:
  e2e-bridge:
    name: E2E Bridge Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      NODE_ENV: test
      PYTHONPATH: .
      MECRIS_HOME: ${{ github.workspace }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mecrisdb_test
          POSTGRES_USER: mecris_test
          POSTGRES_PASSWORD: mecris_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mecris_test -d mecrisdb_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '.pi/extensions/mecris/package-lock.json'

      - name: Install Pi CLI
        run: npm install -g @earendil-works/pi-coding-agent

      - name: Install extension dependencies
        run: |
          cd .pi/extensions/mecris
          npm install
          cd ../../..

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v2

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt pytest pytest-asyncio

      - name: Init test database
        env:
          NEON_DB_URL: postgresql://mecris_test:mecris_test@localhost:5432/mecrisdb_test
        run: |
          # Wait for postgres to be ready
          for i in {1..30}; do
            if pg_isready -h localhost -U mecris_test -d mecrisdb_test; then
              break
            fi
            echo "Waiting for postgres... ($i/30)"
            sleep 1
          done
          
          # Run schema init if present
          if [ -f scripts/initialize_neon.py ]; then
            .venv/bin/python scripts/initialize_neon.py || true
          fi
          
          # Run migrations
          for f in scripts/migrate_*.py; do
            [ -f "$f" ] && .venv/bin/python "$f" || true
          done

      - name: Test MCP server startup
        id: mcp_startup
        env:
          NEON_DB_URL: postgresql://mecris_test:mecris_test@localhost:5432/mecrisdb_test
        timeout-minutes: 5
        run: |
          set +e
          set -o pipefail
          
          # Start the MCP stdio server in the background and capture output
          timeout 10 .venv/bin/python mcp_stdio_server.py <<< 'exit' 2>&1 | tee /tmp/mcp-startup.log || true
          
          # Check if it printed the expected startup message
          if grep -q "tools\|error\|Traceback" /tmp/mcp-startup.log; then
            echo "✓ MCP server responded"
            echo "startup_ok=true" >> $GITHUB_OUTPUT
          else
            echo "✗ MCP server did not respond as expected"
            echo "startup_ok=false" >> $GITHUB_OUTPUT
          fi
          
          set +o pipefail
          set -e

      - name: Validate extension schema
        id: schema_validation
        run: |
          set +e
          set -o pipefail
          
          # Check that the extension TypeScript compiles (just validate it can be read)
          if [ -f ".pi/extensions/mecris/index.ts" ]; then
            echo "✓ Extension file exists"
            
            # Check for key patterns
            if grep -q "mecris_load_tools\|MCP_STDIO_SCRIPT\|registerTool" .pi/extensions/mecris/index.ts; then
              echo "✓ Extension contains expected patterns"
              echo "schema_ok=true" >> $GITHUB_OUTPUT
            else
              echo "✗ Extension missing expected patterns"
              echo "schema_ok=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "✗ Extension file not found"
            echo "schema_ok=false" >> $GITHUB_OUTPUT
          fi
          
          set +o pipefail
          set -e

      - name: Dry-run E2E test script
        id: dryrun
        timeout-minutes: 5
        run: |
          set +e
          set -o pipefail
          
          # Just verify the script is executable and has expected test cases
          if [ -x tests/e2e_pi_mecris.sh ]; then
            echo "✓ Test script is executable"
            
            # Check for test patterns
            test_count=$(grep -c "test_case" tests/e2e_pi_mecris.sh || echo 0)
            echo "Found $test_count test cases"
            
            if [ "$test_count" -gt 0 ]; then
              echo "✓ Test script has test cases defined"
              echo "tests_defined=true" >> $GITHUB_OUTPUT
            else
              echo "✗ No test cases found"
              echo "tests_defined=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "✗ Test script not executable"
            echo "tests_defined=false" >> $GITHUB_OUTPUT
          fi
          
          set +o pipefail
          set -e

      - name: Run Python unit tests (core bridge logic)
        id: python_tests
        env:
          NEON_DB_URL: postgresql://mecris_test:mecris_test@localhost:5432/mecrisdb_test
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          
          # Run tests if they exist (skip beta9 tests that need external API on port 3000)
          if [ -d tests/ ] && find tests/ -name "test_*.py" -o -name "*_test.py" | grep -q . ; then
            .venv/bin/pytest tests/ \
              --ignore=tests/test_beta9_e2e.py \
              --ignore=tests/test_beta9_regressions.py \
              -q --tb=short 2>&1 | tee /tmp/pytest-output.txt
          else
            echo "No Python tests found, skipping"
            echo "No tests found" > /tmp/pytest-output.txt
          fi
          
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          set +o pipefail
          set -e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            /tmp/mcp-startup.log
            /tmp/pytest-output.txt
          retention-days: 7

      - name: Report results
        if: always()
        run: |
          echo "## E2E Pi + Mecris Bridge Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Setup Status" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Node.js: installed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Python: installed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Pi CLI: installed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Extension deps: npm installed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Validation Status" >> $GITHUB_STEP_SUMMARY
          MCP_OK="${{ steps.mcp_startup.outputs.startup_ok }}"
          SCHEMA_OK="${{ steps.schema_validation.outputs.schema_ok }}"
          TESTS_OK="${{ steps.dryrun.outputs.tests_defined }}"
          
          [ "$MCP_OK" = "true" ] && MCP_ICON="✅" || MCP_ICON="⚠️"
          [ "$SCHEMA_OK" = "true" ] && SCHEMA_ICON="✅" || SCHEMA_ICON="⚠️"
          [ "$TESTS_OK" = "true" ] && TESTS_ICON="✅" || TESTS_ICON="⚠️"
          
          echo "- $MCP_ICON MCP server startup" >> $GITHUB_STEP_SUMMARY
          echo "- $SCHEMA_ICON Extension schema validation" >> $GITHUB_STEP_SUMMARY
          echo "- $TESTS_ICON E2E test cases defined" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          PY_CODE="${{ steps.python_tests.outputs.exit_code }}"
          if [ "$PY_CODE" = "0" ]; then
            echo "- ✅ Python unit tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ Python unit tests skipped or failed (exit: $PY_CODE)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Full E2E tests require live Pi provider (GitHub Copilot, Groq, Anthropic)" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Configure secrets for provider credentials" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Run \`./tests/e2e_pi_mecris.sh\` locally with a provider" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Logs" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/mcp-startup.log ]; then
            echo "<details><summary>MCP Startup Log</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            head -50 /tmp/mcp-startup.log >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set workflow status
        if: failure()
        run: exit 1
