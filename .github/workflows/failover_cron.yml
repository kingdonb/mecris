name: Autonomous Failover Cron

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping-failover-api:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Spin API Failover Endpoint
        run: |
          # Use curl to hit the /internal/failover-sync endpoint
          # This triggers the Cloud Brain to check if the local MCP server is alive.
          # If the local server is down, the Spin API will autonomously scrape Clozemaster and update Beeminder.
          curl -sS -X POST "https://mecris-go-api-xupkwcis.fermyon.app/internal/failover-sync"
