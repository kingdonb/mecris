name: Release
on:
  push:
    tags:
      - 'v*'
      - '0.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4+ latest main

      - name: Set up JDK 17
        uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5 # v4+ latest main
        with:
          java-version: '17'
          distribution: 'temurin'
          # Disabling the built-in cache to manage it manually for better resilience
          cache: ''

      - name: Cache Gradle packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4+ latest main
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x mecris-go-project/gradlew

      - name: Build with Gradle
        working-directory: ./mecris-go-project
        run: ./gradlew assembleRelease --no-daemon --max-workers=2

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4+ latest main
        with:
          name: mecris-go-release-apk
          path: mecris-go-project/app/build/outputs/apk/release/*.apk
          retention-days: 1

  build-wasm:
    name: Build WASM Components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4+ latest main

      - name: Setup Rust
        run: |
          rustup update stable
          rustup target add wasm32-wasip1

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@469cb0e24707e1f169c4501c23d77da83a83fce8 # v2+ latest master

      - name: Cache Spin & Python Dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4+ latest main
        with:
          path: |
            ~/.local/share/spin
            ~/.cache/pip
          key: ${{ runner.os }}-spin-pip-${{ hashFiles('**/requirements.txt', '**/spin.toml') }}
          restore-keys: |
            ${{ runner.os }}-spin-pip-

      - name: Setup Spin
        uses: fermyon/actions/spin/setup@8849a6c41270af8e9f60f371982eddf33b8e35c9 # v1.x latest main

      - name: Install py2wasm plugin
        run: spin plugins install py2wasm --yes

      - name: Build sync-service suite
        working-directory: ./mecris-go-spin/sync-service
        run: spin build

      - name: Build boris-fiona-walker
        working-directory: ./boris-fiona-walker
        run: spin build

      - name: Prepare WASM Artifacts
        run: |
          mkdir -p wasm-artifacts
          cp mecris-go-spin/sync-service/target/wasm32-wasip1/release/sync_service.wasm wasm-artifacts/sync_service.wasm || true
          cp mecris-go-spin/arabic-skip-counter/arabic-skip-counter.wasm wasm-artifacts/arabic-skip-counter.wasm || true
          cp mecris-go-spin/review-pump/target/wasm32-wasip1/release/review_pump.wasm wasm-artifacts/review_pump.wasm || true
          cp boris-fiona-walker/target/wasm32-wasip1/release/boris_fiona_walker.wasm wasm-artifacts/boris_fiona_walker.wasm || true
          tar -czvf wasm-components.tar.gz -C wasm-artifacts .

      - name: Upload WASM Bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4+ latest main
        with:
          name: wasm-components-bundle
          path: wasm-components.tar.gz
          retention-days: 1

  publish-release:
    name: Publish GitHub Release
    needs: [build-android, build-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v4+ latest main
        with:
          name: mecris-go-release-apk
          path: release-artifacts/apk

      - name: Download WASM Bundle
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v4+ latest main
        with:
          name: wasm-components-bundle
          path: release-artifacts/wasm

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          cp release-artifacts/apk/*.apk release-assets/mecris-go-release-unsigned.apk || true
          cp release-artifacts/wasm/wasm-components.tar.gz release-assets/ || true

      - name: Create Release
        uses: softprops/action-gh-release@4dd30955cca228da305ffee6fbc3fc1f95d447c2 # v2+ latest master
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: true
